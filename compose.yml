services:
  api-fornecedor:
    build: .
    image: ms-api-fornecedor:v1
    container_name: ms-api-fornecedor
    ports:
      - "3333:3333"
    env_file:
      - .env
    command: npm run start
    environment:
      - TZ=America/Sao_Paulo
      # Variáveis para conexão com MySQL (simulando o RDS)
      - DB_HOST=mysqldb
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      mysqldb:
        condition: service_healthy

  mysqldb:
    image: mysql:8.0
    container_name: mysqldb
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      #MYSQL_USER: ${DB_USER}
      #MYSQL_PASSWORD: ${PWD_DB}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${DB_PASS} || exit 1"]
      interval: 10s    # Tenta a cada 10 segundos
      timeout: 5s      # Se demorar mais de 5s, considera falha
      retries: 10
      start_period: 30s


volumes:
  mysql-data: